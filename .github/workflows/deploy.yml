name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main] # Nếu huynh dùng nhánh master thì sửa thành master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://soetie:$HF_TOKEN@huggingface.co/spaces/soetie/salonhub-backend main