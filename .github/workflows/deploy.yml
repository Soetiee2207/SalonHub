name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Clean and Push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Thiết lập danh tính để commit
          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Action"
          
          # Tạo một nhánh tạm thời không có lịch sử cũ
          git checkout --orphan temp_branch
          
          # Loại bỏ tất cả các file ảnh khỏi chỉ mục trước khi commit
          git rm -rf --cached . 
          
          # Chỉ add lại những gì cần thiết (Loại trừ sạch bóng quân thù JPG/PNG)
          # Nhớ tạo file .gitignore có chặn *.jpg trước khi push
          git add .
          
          # Commit bản sạch
          git commit -m "Deploy clean version without binaries"
          
          # Ép Hugging Face nhận bản này làm bản chính (main)
          git push --force https://soetie:$HF_TOKEN@huggingface.co/spaces/soetie/salonhub-backend temp_branch:main
